<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Hanken Grotesk font import -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Daylist</title>
</head>
<body>
  <img src="assets/icons/arrow.svg" alt="" class="back-btn">

  <div class="list-information">
    <p class="weather">☀️ 67°F - 45°F</p>
    <p class="date">📅 Thursday 4/23/26</p>
    <h1 class="list-title">April 23 Daylist</h1>
  </div>

  <div class="section-divider"></div>

  <div class="todo-list">
    <h2>To-Do List</h2>
    <div class="task-container">
      <button class="task-state-btn"></button>
      <p>Tap to add a task</p>
    </div>
  </div>

  <div class="section-divider"></div>

  <div class="notes">
    <h2>Notes</h2>
    <ul>
      <li class="note">
        Tap to add a note
      </li>
    </ul>
  </div>

</body>
</html>
